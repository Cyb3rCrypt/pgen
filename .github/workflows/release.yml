name: Release

on:
  push:
    tags:
      - "v*.*.*"

permissions:
  contents: write  # Required to create GitHub releases and upload assets

jobs:
  build:
    name: Build (${{ matrix.target }})
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            artifact: passid
          - os: ubuntu-latest
            target: aarch64-unknown-linux-gnu
            artifact: passid
          - os: macos-latest
            target: x86_64-apple-darwin
            artifact: passid
          - os: macos-latest
            target: aarch64-apple-darwin
            artifact: passid
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            artifact: passid.exe

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install cross-compilation tools (Linux aarch64)
        if: matrix.target == 'aarch64-unknown-linux-gnu'
        run: |
          sudo apt-get update
          sudo apt-get install -y gcc-aarch64-linux-gnu

      - name: Build release binary
        run: cargo build --release --target ${{ matrix.target }}
        env:
          CARGO_TARGET_AARCH64_UNKNOWN_LINUX_GNU_LINKER: aarch64-linux-gnu-gcc

      - name: Package binary (Unix)
        if: runner.os != 'Windows'
        run: |
          cd target/${{ matrix.target }}/release
          tar czf passid-${{ github.ref_name }}-${{ matrix.target }}.tar.gz ${{ matrix.artifact }}

      - name: Package binary (Windows)
        if: runner.os == 'Windows'
        run: |
          cd target/${{ matrix.target }}/release
          Compress-Archive -Path ${{ matrix.artifact }} -DestinationPath passid-${{ github.ref_name }}-${{ matrix.target }}.zip

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: passid-${{ matrix.target }}
          path: |
            target/${{ matrix.target }}/release/*.tar.gz
            target/${{ matrix.target }}/release/*.zip

  release:
    name: Create GitHub Release
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: Generate checksums
        run: |
          cd artifacts
          sha256sum *.tar.gz *.zip | sort -k2 > checksums.txt
          cat checksums.txt

      - name: Generate release notes
        run: |
          cd artifacts
          echo "## SHA256 Checksums" > release-notes.md
          echo "" >> release-notes.md
          echo "| File | SHA256 |" >> release-notes.md
          echo "|------|--------|" >> release-notes.md
          while IFS="  " read -r hash file; do
            echo "| \`$file\` | \`$hash\` |" >> release-notes.md
          done < checksums.txt
          echo "" >> release-notes.md
          echo "Verify with:" >> release-notes.md
          echo '```sh' >> release-notes.md
          echo 'sha256sum --check --ignore-missing checksums.txt' >> release-notes.md
          echo '```' >> release-notes.md
          echo "" >> release-notes.md
          echo "---" >> release-notes.md
          echo "" >> release-notes.md
          cat release-notes.md

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            artifacts/*.tar.gz
            artifacts/*.zip
            artifacts/checksums.txt
          body_path: artifacts/release-notes.md
          generate_release_notes: true

  publish:
    name: Publish to crates.io
    needs: release
    runs-on: ubuntu-latest
    environment: crates-io
    permissions:
      id-token: write  # Required for OIDC token exchange with crates.io
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Authenticate with crates.io (OIDC)
        uses: rust-lang/crates-io-auth-action@v1
        id: auth

      - name: Publish to crates.io
        run: cargo publish
        env:
          CARGO_REGISTRY_TOKEN: ${{ steps.auth.outputs.token }}
